[update]
channel = "stable"

[terminal]
default_shell = "zsh"
shell_mode = "auto"
# bind c new-window -c "#{pane_current_path}" に対応
new_cwd = "follow"

[keys]
# unbind C-b / set -g prefix ^T に対応
prefix = "ctrl+t"
previous_workspace = "prefix+up"
next_workspace = "prefix+down"
previous_agent = "prefix+,"
next_agent = "prefix+."
switch_workspace = "prefix+shift+1..9"
last_pane = "prefix+o"
reload_config = "prefix+shift+r" # 再読み込み

# デフォルトの goto (prefix+g) は tig と衝突するため移動
goto = "prefix+alt+g"

# bind c new-window に対応
new_tab = "prefix+c"

# bind j next-window に対応
next_tab = "prefix+j"

# bind k previous-window に対応
previous_tab = "prefix+k"

# bind | split-window -h に対応
split_vertical = "prefix+backslash"

# bind - split-window -v に対応
split_horizontal = "prefix+minus"

# bind h/l/u/m select-pane に対応
focus_pane_left  = "prefix+h"
focus_pane_right = "prefix+l"
focus_pane_up    = "prefix+u"
focus_pane_down  = "prefix+m"

# bind g popup ... tig に対応
[[keys.command]]
key         = "prefix+g"
type        = "pane"
command     = "tig"
description = "open tig"

# bind i popup ... lf に対応
[[keys.command]]
key         = "prefix+i"
type        = "pane"
command     = "lf"
description = "open lf"

# bind p fzf file picker → クリップボードへパスをコピー
[[keys.command]]
key         = "prefix+p"
type        = "shell"
command     = "fd -i --type file | fzf | tr -d '\\n' | pbcopy"
description = "copy file path to clipboard"

[[keys.command]]
key = "prefix+shift+u"
type = "pane"
command = "~/dotfiles/scripts/herdr-switch.sh"
description = "switch current agent"

[theme]
name = "catppuccin"

[ui]
# set -g mouse on に対応
mouse_capture          = true
sidebar_width          = 32
sidebar_min_width      = 18
sidebar_max_width      = 36
# bind K confirm-before "kill-window" に対応
confirm_close          = true
prompt_new_tab_name    = false
pane_borders           = true
pane_gaps              = true
# pane-active-border-style fg="colour39" (cyan) に対応
accent                 = "cyan"

[ui.toast]
delivery = "terminal"

[ui.toast.herdr]
position = "bottom-right"

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true
