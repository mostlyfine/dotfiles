# FYI: https://herdr.dev/docs/config-reference/
onboarding = false

[update]
channel = "stable"

[terminal]
default_shell = "zsh"
shell_mode = "auto"
# bind c new-window -c "#{pane_current_path}" に対応
new_cwd = "follow"

[keys]
# unbind C-b / set -g prefix ^T に対応
prefix = "ctrl+t"
previous_workspace = "prefix+up"
next_workspace = "prefix+down"
previous_agent = "prefix+,"
next_agent = "prefix+."
switch_workspace = "prefix+shift+1..9"
reload_config = "prefix+shift+r" # 再読み込み

# デフォルトの goto picker
goto = "prefix+g"

# bind c new-window に対応
new_tab = "prefix+c"

# bind j next-window に対応
next_tab = "prefix+j"

# bind k previous-window に対応
previous_tab = "prefix+k"

# bind | split-window -h に対応
split_vertical = "prefix+backslash"

# bind - split-window -v に対応
split_horizontal = "prefix+minus"

close_pane = "prefix+shift+k"

# bind h/l/u/m select-pane に対応
focus_pane_left  = "prefix+h"
focus_pane_right = "prefix+l"
focus_pane_up    = "prefix+u"
focus_pane_down  = "prefix+m"

# bind p fzf file picker → クリップボードへパスをコピー
[[keys.command]]
key         = "prefix+p"
type        = "popup"
command     = "fd -i --type file | fzf | tr -d '\\n' | pbcopy"
description = "copy file path to clipboard"

[[keys.command]]
key = "prefix+shift+u"
type = "pane"
command = "~/dotfiles/scripts/herdr-switch.sh"
description = "switch current agent"

[[keys.command]]
key = "prefix+d"
type = "pane"
description = "selected git diff"
command = "git status -s | fzf | awk '{print $2}' | xargs -o git diff"

[[keys.command]]
key = "prefix+o"
type = "popup"
command = '''
repo="$(ghq list -p | fzf)" || exit 0
[ -n "$repo" ] || exit 0
herdr_bin="${HERDR_BIN_PATH:-herdr}"
label="$(basename "$repo")"
"$herdr_bin" workspace create --cwd "$repo" --label "$label" --focus
'''
description = "open ghq space"

# herdr-file-viewer: prefix+f で split 起動
[[keys.command]]
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"
description = "Open file viewer in split pane"

# herdr-plugin-hunk: prefix+shift+h で watch mode の worktree diff
[[keys.command]]
key = "prefix+shift+h"
type = "shell"
command = '''
set -eu
herdr_bin="${HERDR_BIN_PATH:-herdr}"
hunk_pane="$("$herdr_bin" pane split "$HERDR_ACTIVE_PANE_ID" --direction right --cwd "$PWD" --focus | jq -r '.result.pane.pane_id')"
"$herdr_bin" pane rename "$hunk_pane" "$PWD"
"$herdr_bin" pane run "$hunk_pane" "hunk diff --watch --no-transparent-bg && \"\${HERDR_BIN_PATH:-herdr}\" pane close \"$hunk_pane\""
'''
description = "Open watched worktree diff in split pane"

# tig: prefix+shift+g で横に tig を表示、終了時にペインを閉じる
[[keys.command]]
key = "prefix+shift+g"
type = "shell"
command = '''
set -eu

herdr_bin="${HERDR_BIN_PATH:-herdr}"
tig_pane="$("$herdr_bin" pane split "$HERDR_ACTIVE_PANE_ID" --direction right --cwd "$PWD" --focus | jq -r '.result.pane.pane_id')"
"$herdr_bin" pane rename "$tig_pane" tig
"$herdr_bin" pane run "$tig_pane" "tig && \"\${HERDR_BIN_PATH:-herdr}\" pane close \"$tig_pane\""
'''
description = "Open tig in split pane"

[theme]
name = "catppuccin"

[ui]
# set -g mouse on に対応
mouse_capture          = true
sidebar_width          = 32
sidebar_min_width      = 18
sidebar_max_width      = 36
# bind K confirm-before "kill-window" に対応
confirm_close          = true
prompt_new_tab_name    = false
pane_borders           = true
pane_gaps              = true
# pane-active-border-style fg="colour39" (cyan) に対応
accent                 = "cyan"

agent_panel_sort = "spaces"
[ui.toast]
delivery = "terminal"

[ui.toast.herdr]
position = "bottom-right"

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[experimental]
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex", "copilot"]
cjk_ime_cursor_shape = "steady_block"
switch_ascii_input_source_in_prefix = true
